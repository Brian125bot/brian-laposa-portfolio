<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#1a202c"/>
  <!-- Cross with notched ends -->
  <rect x="185" y="60" width="30" height="180" rx="2" fill="#2d3748" stroke="#d69e2e" stroke-width="1.5"/>
  <rect x="130" y="115" width="140" height="30" rx="2" fill="#2d3748" stroke="#d69e2e" stroke-width="1.5"/>
  <!-- Notch details (dog-tag style) -->
  <circle cx="200" cy="68" r="4" fill="#1a202c" stroke="#d69e2e" stroke-width="1"/>
  <circle cx="200" cy="232" r="4" fill="#1a202c" stroke="#d69e2e" stroke-width="1"/>
  <circle cx="138" cy="130" r="4" fill="#1a202c" stroke="#d69e2e" stroke-width="1"/>
  <circle cx="262" cy="130" r="4" fill="#1a202c" stroke="#d69e2e" stroke-width="1"/>
  <!-- Chain link hints -->
  <ellipse cx="200" cy="48" rx="8" ry="5" stroke="#d69e2e" stroke-width="1" fill="none" opacity="0.6"/>
  <ellipse cx="200" cy="252" rx="8" ry="5" stroke="#d69e2e" stroke-width="1" fill="none" opacity="0.6"/>
</svg>
